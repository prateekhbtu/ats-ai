name = "ats-ai"
main = "src/index.ts"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Secrets (set via `wrangler secret put`):
# DATABASE_URL      - NeonDB connection string
# VERTEX_AI_PROJECT_ID  - Google Cloud Project ID
# VERTEX_AI_LOCATION    - Vertex AI Location (e.g. us-central1)
# VERTEX_AI_CLIENT_EMAIL - Google Service Account Email
# VERTEX_AI_PRIVATE_KEY  - Google Service Account Private Key
# GOOGLE_CLIENT_ID  - Google OAuth Client ID
# JWT_SECRET        - JWT signing secret
# RESEND_API_KEY    - Resend email service API key
# RESEND_FROM_EMAIL - Sender email address for Resend
# RESEND_FROM_NAME  - Sender display name for Resend
# CLOUDINARY_CLOUD_NAME - Cloudinary cloud name
# CLOUDINARY_API_KEY    - Cloudinary API key
# CLOUDINARY_API_SECRET - Cloudinary API secret
# FRONTEND_URL      - Frontend app URL (for email links)
